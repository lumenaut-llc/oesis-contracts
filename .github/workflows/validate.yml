name: Validate

# Gate merges to main so release-fanout only ever propagates valid contracts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  json-validate:
    name: Parse every JSON schema and example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON parses
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import json, sys; json.load(open(sys.argv[1]))" "$f"; then
              echo "Invalid JSON: $f"
              fail=1
            fi
          done < <(git ls-files '*.json')
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All JSON files parse."

  schema-example-coverage:
    name: Every schema has an example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check coverage
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for lane_dir in v0.1 v1.0 v1.5 bundles/contracts-bundle; do
            if [ ! -d "$lane_dir/schemas" ]; then continue; fi
            for schema in "$lane_dir"/schemas/*.schema.json; do
              [ -e "$schema" ] || continue
              base=$(basename "$schema" .schema.json)
              if ! ls "$lane_dir"/examples/"$base".example.json >/dev/null 2>&1; then
                echo "Missing example for $lane_dir/$base"
                missing=1
              fi
            done
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "Every schema has a matching example."

  examples-match-schema:
    name: Examples validate against their schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jsonschema==4.23.0 referencing==0.35.1
      - name: Validate each example
        # Schemas inside a lane reference each other via relative $ref (e.g.
        # "sharing-settings.schema.json"). A single Python driver builds a
        # referencing.Registry per lane so those cross-schema refs resolve.
        shell: bash
        run: python3 scripts/validate_examples.py

  runtime-compat:
    # Pre-fanout breaking-change check: validate that oesis-runtime's
    # hand-coded validators still accept every contract example on this PR.
    # If a schema change tightens a constraint runtime can't honor, this
    # blocks the merge BEFORE release-fanout opens broken sync PRs across
    # downstream repos.
    #
    # Failure here means: this PR would break runtime sync. Fix one of:
    #   (a) update the runtime validator in a follow-up runtime PR first
    #   (b) revisit the contract change to be backward-compatible
    #   (c) document an explicit migration path before merging
    #
    # See CONSUMING.md "Pattern 1 — Runtime" for the validator-drift contract.
    name: Runtime validators accept contract examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout contracts (PR branch)
        uses: actions/checkout@v4
        with:
          path: contracts
      - name: Checkout runtime (main)
        uses: actions/checkout@v4
        with:
          repository: lumenaut-llc/oesis_runtime
          ref: main
          path: runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run pre-fanout compat check
        working-directory: contracts
        env:
          RUNTIME_PATH: ${{ github.workspace }}/runtime
        run: python3 scripts/check_runtime_compat.py
